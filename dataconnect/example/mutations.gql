mutation CreateUser(
  $username: String!,
  $email: String!,
  $displayName: String,
) @auth(level: USER) {
  user_insert(data: {
    id_expr: "auth.uid"
    username: $username
    email: $email
    displayName: $displayName
  })
}

mutation UpdateUserProfile(
  $username: String!,
  $email: String!,
  $displayName: String,
  $bio: String,
  $location: String,
  $profilePictureUrl: String,
) @auth(level: USER) {
  user_upsert(data: {
    #id: $id
    #userId: $user.uid,
    id_expr: "auth.uid"
    username: $username
    email: $email
    displayName: $displayName
    bio: $bio
    location: $location
    profilePictureUrl: $profilePictureUrl
  })
}

mutation CreatePost(
  $userId: String!,
  $content: String!,
  $imageUrl: String!,
  $locationTag: String,
  $zipCode: String,
  $top: String,
  $bottom: String,
  $outerwear: String,
  $wornAt: Timestamp
) @auth(level: USER) {
  post_insert(data: {
    user: { id: $userId }
    content: $content
    imageUrl: $imageUrl
    locationTag: $locationTag
    zipCode: $zipCode
    top: $top
    bottom: $bottom
    outerwear: $outerwear
    wornAt: $wornAt
  })
}
