# dataconnect/example/mutations.gql

mutation CreateUser($id: String!, $username: String!, $email: String!, $displayName: String) 
  @auth(level: USER) { # Allows any logged-in user to call this
  user_insert(data: {
    id: $id,
    username: $username,
    email: $email,
    displayName: $displayName
  })
}

# dataconnect/example/mutations.gql

# Mutation to update profile details
mutation UpdateUserProfile(
  $id: String!, 
  $displayName: String, 
  $bio: String, 
  $location: String, 
  $profilePictureUrl: String
) @auth(level: USER) {
  user_upsert(data: {
    id: $id,
    displayName: $displayName,
    bio: $bio,
    location: $location,
    profilePictureUrl: $profilePictureUrl
  })
}