query listPosts @auth(level: PUBLIC) {
  posts {
    id
    content
    imageUrl
    locationTag
    zipCode
    top
    bottom
    outerwear
    wornAt
    createdAt
    user {
      id
      username
      displayName
      profilePictureUrl
    }
  }
}

query getOutfits($userId: String!) @auth(level: USER) {
  outfitRecommendations(where: { user: { id: { eq: $userId } } }) {
    imageUrl
    description
  }
}

query listAllUsers @auth(level: USER) {
  users {
    id
    username
    displayName
    profilePictureUrl
    location
  }
}

query GetUserProfile($id: String!) @auth(level: USER) {
  user(id: $id) {
    id
    username
    displayName
    bio
    location
    profilePictureUrl
    createdAt
  }
}