# dataconnect/schema/schema.gql

type User @table {
  id: String! @default(expr: "auth.uid") 
  username: String!
  email: String!
  displayName: String
  createdAt: Timestamp! @default(expr: "request.time")
  bio: String
  profilePictureUrl: String
  location: String
}
  
type Post @table {
  user: User!
  content: String!
  createdAt: Timestamp! @default(expr: "request.time")
  imageUrl: String!
  locationTag: String
  top: String
  bottom: String
  outerwear: String
  wornAt: Timestamp
}

type Comment @table {
  user: User!
  post: Post!
  content: String!
  createdAt: Timestamp!
}

type Like @table(key: ["user", "post"]) {
  user: User!
  post: Post!
  createdAt: Timestamp!
}

type OutfitRecommendation @table {
  user: User!
  weatherCondition: String!
  temperatureRange: String!
  imageUrl: String!
  createdAt: Timestamp!
  description: String
  clothingItems: [String]
}

type SavedOutfit @table(key: ["user", "outfitRecommendation"]) {
  user: User!
  outfitRecommendation: OutfitRecommendation!
  createdAt: Timestamp!
  notes: String
}